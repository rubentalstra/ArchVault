<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- Top node (parent system) -->
  <rect x="8" y="2" width="8" height="5" rx="1.5"/>
  <!-- Vertical stem from parent to branch point -->
  <path d="M12 7V12"/>
  <!-- Left branch: horizontal then rounded 90° turn down -->
  <path d="M12 12H7a2 2 0 0 0-2 2v3"/>
  <!-- Right branch: horizontal then rounded 90° turn down -->
  <path d="M12 12h5a2 2 0 0 1 2 2v3"/>
  <!-- Bottom-left node -->
  <rect x="1" y="17" width="8" height="5" rx="1.5"/>
  <!-- Bottom-right node -->
  <rect x="15" y="17" width="8" height="5" rx="1.5"/>
</svg>
