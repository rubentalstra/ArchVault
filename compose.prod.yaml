services:
  app:
    image: ghcr.io/rubentalstra/archvault:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-archvault}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-archvault}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.archvault.rule=Host(`${DOMAIN:?Set DOMAIN}`)"
      - "traefik.http.routers.archvault.entrypoints=websecure"
      - "traefik.http.routers.archvault.tls.certresolver=letsencrypt"
      - "traefik.http.services.archvault.loadbalancer.server.port=3000"
      # Security headers middleware
      - "traefik.http.middlewares.archvault-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.archvault-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.archvault-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.archvault-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.archvault-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.archvault-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.archvault-headers.headers.customResponseHeaders.Server="
      - "traefik.http.routers.archvault.middlewares=archvault-headers"
    networks:
      - archvault

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archvault}
      POSTGRES_USER: ${POSTGRES_USER:-archvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archvault} -d ${POSTGRES_DB:-archvault}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - archvault

  # Optional: Traefik reverse proxy with automatic HTTPS
  # Activate with: docker compose -f compose.prod.yaml --profile traefik up -d
  traefik:
    image: traefik:v3
    restart: unless-stopped
    profiles: [traefik]
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=archvault"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?Set ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    security_opt:
      - no-new-privileges:true
    depends_on:
      - app
    networks:
      - archvault

volumes:
  pgdata:
  letsencrypt:

networks:
  archvault:
    driver: bridge
